<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OCC Updates</title>
</head>
<body>
  <h2>Office of the Comptroller of the Currency (OCC) Updates</h2>
  <ul id="occ-feed"></ul>

  <script>
    async function loadOCCFeed() {
      const response = await fetch("https://www.occ.gov/rss/occ-news.xml");
      const text = await response.text();

      const parser = new DOMParser();
      const xml = parser.parseFromString(text, "application/xml");
      const items = xml.querySelectorAll("item");

      const list = document.getElementById("occ-feed");
      list.innerHTML = "";

      items.forEach((item, index) => {
        if (index < 5) { // show latest 5 updates
          const title = item.querySelector("title").textContent;
          const link = item.querySelector("link").textContent;
          const li = document.createElement("li");
          li.innerHTML = `<a href="${link}" target="_blank">${title}</a>`;
          list.appendChild(li);
        }
      });
    }

    loadOCCFeed();
  </script>
</body>
</html>
